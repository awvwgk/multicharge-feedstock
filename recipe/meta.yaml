{% set name = "multicharge" %}
{% set version = "0.5.0" %}

package:
  name: {{ name }}-pkg
  version: {{ version }}

source:
  url: https://github.com/grimme-lab/multicharge/releases/download/v{{ version }}/multicharge-{{ version }}-source.tar.xz
  sha256: fc6dee93fd6957a516137205f5a6754b218904bc38bf60f5a509f2a1b14735be

build:
  number: 1

outputs:
  - name: {{ name }}
    script: build_pkg.sh   # [unix]
    script: build_pkg.bat  # [win]
    build:
      string: {{ module_abi }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
      run_exports:
        - {{ pin_subpackage(name, max_pin='x.x') }}

    requirements:
      build:
        - {{ stdlib('c') }}  # [unix]
        - {{ stdlib('m2w64_c') }}  # [win]
        - {{ compiler('c') }}  # [unix]
        - {{ compiler('fortran') }}  # [unix]
        - {{ compiler('m2w64_c') }}  # [win]
        - {{ compiler('m2w64_fortran') }}  # [win]
        - meson
        - ninja
        - pkg-config
        - asciidoctor  # [unix]
        - llvm-openmp  # [osx]
      host:
        - llvm-openmp  # [osx]
        - libgomp  # [linux]
        - libblas
        - liblapack
        - mctc-lib-devel * {{ module_abi }}_*
      run:
        - llvm-openmp  # [osx]
        - libgomp  # [win]

    test:
      requires:
        - pkg-config
      commands:
        - {{ name }} --version  # [build_platform == target_platform]
        - pkg-config {{ name }} --exact-version {{ version }}
        - test -f $PREFIX/lib/lib{{ name }}$SHLIB_EXT  # [unix]
        - test ! -f $PREFIX/lib/lib{{ name }}.a  # [unix]
        - if not exist %LIBRARY_BIN%\\lib{{ name }}-0.dll exit 1  # [win]

  - name: {{ name }}-devel
    build:
      string: {{ module_abi }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
      run_exports:
        - {{ pin_subpackage(name, max_pin='x.x') }} {{ module_abi }}_*

    requirements:
      run:
        - {{ pin_subpackage(name, max_pin='x.x') }} {{ module_abi }}_*

    test:
      requires:
        - pkg-config
      commands:
        - {{ name }} --version  # [build_platform == target_platform]
        - pkg-config {{ name }} --exact-version {{ version }}
        - test -f $PREFIX/lib/lib{{ name }}$SHLIB_EXT  # [unix]
        - test ! -f $PREFIX/lib/lib{{ name }}.a  # [unix]
        - if not exist %LIBRARY_BIN%\\lib{{ name }}-0.dll exit 1  # [win]

about:
  home: https://github.com/grimme-lab/multicharge
  license: Apache-2.0
  license_file: LICENSE
  summary: Electronegativity equilibration model for atomic partial charges

extra:
  recipe-maintainers:
    - awvwgk
  feedstock-name: {{ name }}
